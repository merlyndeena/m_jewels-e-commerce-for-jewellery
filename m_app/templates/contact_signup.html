<!DOCTYPE html>
{% extends 'index.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-lg-12 grid-margin stretch-card">
              <div class="card">
                <div class="card-body">
                  <h4 class="card-title">View Contact Details</h4>

                  <div class="table-responsive pt-3">
                    <table class="table table-bordered table-hover grid-margin ">
                      <thead>
                        <tr>
                            <th>
                           Customer Name
                          </th>

                          <th>
                        Email Address
                          </th>
                           <th>
                           Message
                          </th>

                           <th>
                            Actions
                          </th>

                        </tr>
                      </thead>
                      <tbody>
                      {% for i in con %}
                        <tr>
                            <td>{{i.c_name}}</td>

                          <td>
                            {{i.c_email}}
                          </td>
                          <td>
                            {{i.c_msg}}
                          </td>



                          <td>
                          <a href="{% url 'delete_con' c_id=i.id %}"><button class="btn btn-primary">Delete</button></a></td>

                        </tr>
                      {% endfor %}
                        <tr>








                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>

</body>
</html>
{% endblock %}
