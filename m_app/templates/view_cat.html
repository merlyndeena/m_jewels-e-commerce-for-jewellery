<!DOCTYPE html>
{% extends 'index.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="col-lg-12 grid-margin stretch-card">
              <div class="card">
                <div class="card-body">
                  <h4 class="card-title">View Category Details</h4>

                  <div class="table-responsive pt-3">
                    <table class="table table-bordered table-hover grid-margin ">
                      <thead>
                        <tr>

                          <th>
                           Category Name
                          </th>
                          <th>
                            Category Image
                          </th>
                          <th>
                            Category Description
                          </th>
                           <th>
                             Actions
                          </th>

                        </tr>
                      </thead>
                      <tbody>
                      {% for i in cat %}
                        <tr>

                          <td>
                            {{i.c_name}}
                          </td>
                        <td>
                          <img src="{{i.c_img.url}}" height="100px" width="100px">
                        </td>


                          <td>
                        {{i.c_desc}}
                          </td>
                          <td><a href="{% url 'edit_cat' c_id=i.id %}"><button class="btn btn-primary">Edit</button></a>
                          <a href="{% url 'delete_cat' c_id=i.id %}"><button class="btn btn-primary">Delete</button></a></td>

                        </tr>
                      {% endfor %}
                        <tr>








                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>

</body>
</html>
{% endblock %}
